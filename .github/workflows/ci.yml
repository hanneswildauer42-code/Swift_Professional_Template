name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Knappere Berechtigungen — Default ist write-all für GITHUB_TOKEN.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-14   # macos-15 sobald GA; ARM-Runner
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Xcode-Version anzeigen
        run: |
          xcodebuild -version
          swift --version

      - name: Swift-Build-Cache
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: SwiftLint installieren
        run: |
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi

      - name: Lint
        # `swiftlint lint` ohne --strict: Warnings sind toleriert, Errors brechen.
        run: swiftlint lint --reporter github-actions-logging

      - name: Format-Check
        run: xcrun swift-format lint --recursive Sources Tests

      - name: Build (Debug)
        run: swift build

      - name: Tests mit Coverage
        run: swift test --enable-code-coverage

      - name: Coverage-Report
        run: ./scripts/coverage_report.sh

      - name: Coverage-Gate prüfen
        # Phase steuert die Schwelle (0/50/70/75/80/80). Default = 0 (kein
        # Gate), aber das Repo überschreibt das über die Variable
        # COVERAGE_PHASE in `Settings → Variables → Actions`.
        # So bleibt das Gate während Phase 0 stumm, ab Phase 1 aktiv.
        env:
          PHASE: ${{ vars.COVERAGE_PHASE || '0' }}
        run: ./scripts/coverage_check.sh "$PHASE"

      - name: Test-Artefakte hochladen (bei Fehler)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            .build/debug.yaml
            .build/**/test-output.xml
          retention-days: 7
          if-no-files-found: ignore

  security:
    name: Security (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks braucht volle History

      - name: gitleaks installieren
        # Direkter CLI-Download statt gitleaks-action — die Action lädt SARIF
        # als Artifact hoch und scheitert, wenn das GitHub-Actions-Storage-
        # Kontingent erreicht ist. CLI-Aufruf hat dieses Problem nicht.
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Secret-Scan
        run: gitleaks detect --source . --verbose --no-banner --redact
