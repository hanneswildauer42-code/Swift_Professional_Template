version: 2
updates:
  # GitHub Actions: wöchentlich aktualisieren
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

  # Swift Packages: wöchentlich (sobald Package.resolved existiert)
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "swift"
