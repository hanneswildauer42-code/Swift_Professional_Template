# SwiftLint-Konfiguration
#
# Schwellen sind bewusst etwas großzügiger als die Defaults gesetzt, damit
# typische SwiftUI-Modifier-Ketten und MVVM-Coordinator-Klassen ohne ständige
# Warnungen durchlaufen. Anpassen wenn Du strenger sein willst.

excluded:
  - .build
  - .swiftpm
  - dist
  - DerivedData
  - .DerivedData
  # Template-Quellen mit Platzhalter-Bezeichnern (Unterstriche verletzen
  # die type_name-Default-Regel). Nach `./scripts/rename_package.sh`
  # existieren diese Pfade nicht mehr — die Quellen liegen dann unter
  # Sources/<DeinName>/ und Tests/<DeinName>Tests/ und werden normal
  # gelintet.
  - Sources/PROJEKT_PACKAGE
  - Tests/PROJEKT_PACKAGETests

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y
    - z

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 600
  error: 800

file_length:
  warning: 800
  error: 1000

function_body_length:
  warning: 80
  error: 120

cyclomatic_complexity:
  warning: 15
  error: 25

function_parameter_count:
  warning: 7
  error: 10

large_tuple:
  warning: 3
  error: 4

# Zusätzliche Regeln aktivieren, die nicht standardmäßig laufen
opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - last_where
  - sorted_first_last
  - unneeded_parentheses_in_closure_argument
  - closure_spacing
  - operator_usage_whitespace
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

disabled_rules:
  - todo   # TODO-Kommentare während der Entwicklung ok
